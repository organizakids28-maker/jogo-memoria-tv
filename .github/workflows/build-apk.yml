name: Build APK Android TV
on:
  push:
    branches: [main, master]
  workflow_dispatch:
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          java-version: '11'
          distribution: 'temurin'

      - name: Instalar Gradle 6.9.4
        run: |
          wget -q https://services.gradle.org/distributions/gradle-6.9.4-bin.zip
          unzip -q gradle-6.9.4-bin.zip
          echo "$GITHUB_WORKSPACE/gradle-6.9.4/bin" >> $GITHUB_PATH

      - name: Compilar APK
        run: gradle assembleDebug

      - name: Disponibilizar APK para download
        uses: actions/upload-artifact@v4
        with:
          name: jogo-memoria-tv-apk
          path: app/build/outputs/apk/debug/app-debug.apk
          retention-days: 7
