name: Build APK Android TV
on:
  push:
    branches: [main, master]
  workflow_dispatch:
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Instalar Gradle 7.6.1
        run: |
          wget -q https://services.gradle.org/distributions/gradle-7.6.1-bin.zip
          unzip -q gradle-7.6.1-bin.zip -d /opt/gradle
          echo "/opt/gradle/gradle-7.6.1/bin" >> $GITHUB_PATH

      - name: Gerar Gradle Wrapper
        run: gradle wrapper --gradle-version 7.6.1

      - name: Compilar APK
        run: ./gradlew assembleDebug

      - name: Disponibilizar APK para download
        uses: actions/upload-artifact@v4
        with:
          name: jogo-memoria-tv-apk
          path: app/build/outputs/apk/debug/app-debug.apk
          retention-days: 7
